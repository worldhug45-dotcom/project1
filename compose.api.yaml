services:
  dashboard:
    environment:
      PROJECT1_RUNTIME_SOURCE_MODE: api
      PROJECT1_SOURCES_BIZINFO_ENABLED: ${PROJECT1_SOURCES_BIZINFO_ENABLED:-true}
      PROJECT1_SOURCES_G2B_ENABLED: ${PROJECT1_SOURCES_G2B_ENABLED:-false}
      PROJECT1_BIZINFO_CERT_KEY: ${PROJECT1_BIZINFO_CERT_KEY:-}
      PROJECT1_G2B_API_KEY: ${PROJECT1_G2B_API_KEY:-}
      PROJECT1_KEYWORDS_OVERRIDE_PATH: ${PROJECT1_KEYWORDS_OVERRIDE_PATH:-config/keywords.docker.override.toml}
      PROJECT1_STORAGE_DATABASE_PATH: ${PROJECT1_STORAGE_DATABASE_PATH:-data/notices.sqlite3}
      PROJECT1_EXPORT_OUTPUT_DIR: ${PROJECT1_EXPORT_OUTPUT_DIR:-output}
