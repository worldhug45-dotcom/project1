services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project1-dashboard
    ports:
      - "8787:8787"
    environment:
      PROJECT1_BIZINFO_CERT_KEY: ${PROJECT1_BIZINFO_CERT_KEY:-}
      PROJECT1_G2B_API_KEY: ${PROJECT1_G2B_API_KEY:-}
      PROJECT1_KEYWORDS_OVERRIDE_PATH: ${PROJECT1_KEYWORDS_OVERRIDE_PATH:-config/keywords.docker.override.toml}
      PROJECT1_STORAGE_DATABASE_PATH: ${PROJECT1_STORAGE_DATABASE_PATH:-data/notices.sqlite3}
      PROJECT1_EXPORT_OUTPUT_DIR: ${PROJECT1_EXPORT_OUTPUT_DIR:-output}
    volumes:
      - ./config:/workspace/config
      - ./data:/workspace/data
      - ./output:/workspace/output
      - ./doc:/workspace/doc
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8787/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
